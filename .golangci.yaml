version: "2"

run:
    timeout: 5m
    tests: true
    skip-dirs:
        - vendor
        - mocks
    skip-files:
        - generated_.*\.go
    modules-download-mode: readonly

linters:
    enable:
        # Базовые и надёжные
        - govet
        - staticcheck
        - errcheck
        - revive
        - misspell
        - gocyclo
        - dupl
        - funlen
        - nolintlint
        - gosec

        # Тесты и новые линтеры
        - tparallel
        - testifylint
        - godoclint
        - iotamixing
        - unqueryvet

    # отключаем только реально существующие шумные линтеры
    disable:
        - lll
        - godox
        - wsl

linters-settings:
    govet:
        check-shadowing: true

    errcheck:
        check-type-assertions: true
        check-blank: true

    gocyclo:
        min-complexity: 15

    dupl:
        threshold: 100

    funlen:
        lines: 80
        statements: 50

    revive:
        confidence: 0.8
        rules:
            - name: unused-parameter
              disabled: true
            - name: var-naming
              arguments: ["ID", "URL", "HTTP"]
            - name: magic-number
              arguments:
                  ignoreNumbers: [0, 1, 2]

    misspell:
        locale: US

    nolintlint:
        allow-unused: false
        require-explanation: true
        require-specific: true

    godoclint:
        default: all
        enable:
            - pkg-doc
            - single-pkg-doc
            - require-pkg-doc
            - start-with-name
            - no-unused-link

    iotamixing:
        report-individual: true

    unqueryvet:
        check-sql-builders: false
        allowed-patterns:
            - "SELECT \\* FROM information_schema\\..*"
            - "SELECT \\* FROM pg_catalog\\..*"
            - "SELECT COUNT\\(\\*\\)"
            - "SELECT MAX\\(\\*)"
            - "SELECT MIN\\(\\*)"

formatters:
    enable:
        - gofmt
        - goimports

issues:
    exclude-use-default: false
    max-issues-per-linter: 0
    max-same-issues: 0
    exclude-rules:
        - path: _test\.go
          linters:
              - funlen
              - gocyclo
              - goconst
